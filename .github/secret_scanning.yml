# Secret-scanning exclusions.
#
# These paths hold VENDORED, UNMODIFIED third-party libraries, self-hosted so the
# Academy has no runtime CDN dependency and works offline. They are large minified
# bundles, and GitHub's heuristics false-positive on them:
#
#   * courses/**/web/lib/transformers.js  -> "Mistral AI API Key"
#     The match is the string "Mistral3ForConditionalGeneration", a model CLASS NAME.
#     It is exactly 32 alphanumeric characters (a Mistral key's shape) and contains
#     the word "Mistral". It sits in a list beside Gemma3ForConditionalGeneration.
#
#   * courses/**/web/lib/web-llm.js -> AWS-key-shaped runs (AKIA...)
#     Coincidental character sequences inside the base64-encoded WASM blob.
#
# We exclude ONLY the vendored lib directories. Every file we actually author is
# still scanned, which is the point: a scanner that cries wolf on every push is a
# scanner nobody reads on the day it is right.
#
# Reviewed and confirmed as false positives: 2026-07-13.
paths-ignore:
  - "courses/*/web/lib/**"
