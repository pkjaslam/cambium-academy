<style>
  :root{--forest:#2C5F2D;--dark:#1F3D24;--moss:#97BC62;--mossdeep:#6E9648;--tint:#F0F5EC;--ink:#1F2A20;--muted:#5C6B5A;--gold:#B98A2D;--goldL:#D9B25C;--parchLine:#E3D9BF;--line:#DFE9D8}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(ellipse 80% 60% at 50% 0%, #EDF2E7 0%, #E2EADB 60%, #D8E2D0 100%);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:12px 22px;font-size:13px;color:var(--muted);flex-wrap:wrap}
  .topbar a{color:var(--forest);text-decoration:none;font-weight:600;display:inline-flex;align-items:center;gap:8px}
  .topbar a:hover{color:var(--mossdeep)}
  .topbar img{width:30px;height:30px}
  .chapters{display:flex;align-items:center;justify-content:center;gap:7px;padding:2px 0 10px}
  .chapters button{width:11px;height:11px;border-radius:50%;border:1.5px solid var(--mossdeep);background:transparent;cursor:pointer;padding:0;transition:all .25s;position:relative}
  .chapters button.on{background:var(--forest);border-color:var(--forest);transform:scale(1.25)}
  .chapters button.past{background:var(--moss);border-color:var(--moss)}
  .chapters button:hover::after{content:attr(data-t);position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:var(--dark);color:#E8F2DE;font-size:11px;padding:4px 10px;border-radius:6px;white-space:nowrap;z-index:20}
  .bar{height:3px;background:rgba(110,150,72,.22)}
  .bar i{display:block;height:3px;background:linear-gradient(90deg,var(--forest),var(--moss));transition:width .3s}
  .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:14px 16px 6px}
  .slide{width:min(1020px,96vw);aspect-ratio:16/9;border-radius:18px;padding:4.4% 5.2%;overflow:auto;position:relative;
    background:linear-gradient(160deg,#FFFDF6 0%,#FBF7EA 55%,#F6F0DE 100%);
    border:1px solid var(--parchLine);
    box-shadow:0 24px 60px rgba(31,42,32,.22), 0 3px 12px rgba(31,42,32,.10), inset 0 0 0 1px rgba(217,178,92,.25);
    animation:slideIn .38s cubic-bezier(.22,1,.36,1)}
  @keyframes slideIn{from{opacity:0;transform:translateY(14px) scale(.99)}to{opacity:1;transform:none}}
  .slide.dark{background:radial-gradient(ellipse 90% 80% at 50% 20%, #2C4A28 0%, #1F3D24 55%, #16240F 100%);color:#fff;border-color:#183018;box-shadow:0 24px 60px rgba(10,18,9,.45), inset 0 0 0 1px rgba(217,178,92,.35)}
  .slide.dark::after{content:'';position:absolute;inset:12px;border:1px solid rgba(217,178,92,.28);border-radius:10px;pointer-events:none}
  .wm{position:absolute;right:2%;bottom:-6%;font-family:'Cormorant Garamond',Georgia,serif;font-weight:700;font-size:clamp(160px,30vw,300px);line-height:1;color:rgba(217,178,92,.10);pointer-events:none;user-select:none}
  .kicker{display:flex;align-items:center;gap:10px;color:var(--mossdeep);font-size:clamp(10px,1.15vw,12.5px);font-weight:700;letter-spacing:2.6px;text-transform:uppercase}
  .kicker::before{content:'';width:26px;height:1.5px;background:var(--gold)}
  .dark .kicker{color:var(--moss)}
  .dark .kicker::before{background:var(--goldL)}
  h1{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(26px,3.6vw,44px);font-weight:700;margin:8px 0 4px;line-height:1.08}
  h2.stitle{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(21px,2.9vw,33px);font-weight:700;margin:8px 0 16px;line-height:1.12}
  .sub{font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;color:var(--moss);font-size:clamp(15px,2vw,21px);font-weight:500}
  .rows{display:flex;flex-direction:column;gap:2.4%}
  .row{display:flex;gap:13px;align-items:flex-start}
  .dot{flex:0 0 9px;width:9px;height:9px;background:var(--gold);margin-top:9px;transform:rotate(45deg);box-shadow:0 0 0 3px rgba(185,138,45,.18)}
  .row b{display:block;font-size:clamp(13px,1.55vw,16.5px);color:var(--ink)}
  .row span{color:var(--muted);font-size:clamp(12px,1.35vw,14px)}
  .dark .row b{color:#F2F8EA}
  .dark .row span{color:#CFE3BF}
  .dark .dot{box-shadow:0 0 0 3px rgba(217,178,92,.25)}
  .grid{display:grid;gap:13px}
  .g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}
  .card{border:1px solid var(--parchLine);border-radius:12px;padding:13px 15px;background:#FFFEFA;box-shadow:0 2px 10px rgba(31,42,32,.06);transition:transform .2s, box-shadow .2s}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(31,42,32,.12)}
  .card.tint{background:var(--tint);border-color:var(--line)}
  .card b{font-size:clamp(12px,1.45vw,15.5px);color:var(--ink)}
  .card .cnum{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(17px,2vw,24px);font-weight:700;color:var(--gold)}
  .card p{color:var(--muted);font-size:clamp(11px,1.25vw,13.5px);margin-top:4px}
  .quote{background:linear-gradient(135deg,#F5F0E1,#EFE8D3);border:1px solid var(--parchLine);border-left:3px solid var(--gold);border-radius:12px;padding:15px 20px;font-family:'Cormorant Garamond',Georgia,serif;font-style:italic;font-size:clamp(14px,1.9vw,20px);margin-bottom:15px;color:#33402F}
  .quote em{color:var(--forest);font-weight:700}
  .note{background:var(--tint);border:1px solid var(--line);border-radius:10px;padding:11px 15px;font-size:clamp(11px,1.35vw,14px);margin-top:15px;color:var(--ink)}
  .note.warn{background:#FBF3E4;border-color:#EAD9B8}
  .note b{color:var(--forest)}
  .note.warn b{color:var(--gold)}
  .note a{color:var(--forest);font-weight:700}
  table{width:100%;border-collapse:separate;border-spacing:0;font-size:clamp(11px,1.35vw,14.5px);border-radius:12px;overflow:hidden;border:1px solid var(--parchLine)}
  th{background:linear-gradient(180deg,#2F5A2A,#254D24);color:#F2F8EA;text-align:left;padding:10px 13px;font-weight:600;letter-spacing:.4px;border-bottom:2px solid var(--gold)}
  td{padding:9px 13px;border-bottom:1px solid #F0E9D6;background:#FFFEFA}
  tr:nth-child(even) td{background:#FAF6EA}
  tr:last-child td{border-bottom:none}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .stat{border:1px solid var(--parchLine);border-radius:12px;padding:15px 18px;background:#FFFEFA;box-shadow:0 2px 10px rgba(31,42,32,.06)}
  .stat .v{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(26px,3.6vw,44px);font-weight:700;background:linear-gradient(180deg,#8C6320,#D9B25C 50%,#7A561C);-webkit-background-clip:text;background-clip:text;color:transparent}
  .stat:nth-child(even) .v{background:linear-gradient(180deg,#234D24,#6E9648 60%,#2C5F2D);-webkit-background-clip:text;background-clip:text;color:transparent}
  .stat p{color:var(--muted);font-size:clamp(11px,1.25vw,13px);margin-top:2px}
  .nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 0 18px}
  .nav button{background:linear-gradient(180deg,#2F5A2A,#234D24);color:#F2F8EA;border:1px solid #1B3A1A;border-radius:10px;padding:11px 24px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(31,61,36,.25);transition:all .2s}
  .nav button:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(31,61,36,.35)}
  .nav button:disabled{opacity:.35;cursor:default;transform:none;box-shadow:none}
  .count{font-family:'Cormorant Garamond',Georgia,serif;font-size:17px;color:var(--muted);min-width:76px;text-align:center}
  .count b{color:var(--forest);font-size:20px}
  .bignum{font-family:'Cormorant Garamond',Georgia,serif;font-size:clamp(30px,5vw,58px);font-weight:700;color:var(--moss)}
  .foot{position:absolute;bottom:4%;left:5.2%;font-size:clamp(9px,1vw,11px);color:#7FA06F;letter-spacing:1px}
  .chip{position:absolute;right:4.4%;bottom:6%;width:clamp(40px,5vw,58px);height:clamp(40px,5vw,58px);border-radius:50%;background:#FFFDF6;display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 3px rgba(217,178,92,.4)}
  .chip img{width:74%;height:74%;object-fit:contain}
  .hintk{color:#9DB292;font-size:12px}
  @media (max-width:640px) and (orientation:portrait){
    .stage{align-items:flex-start;padding-top:6px}
    .slide{aspect-ratio:auto;min-height:74vh;padding:6% 5.5%}
    .foot{position:static;margin-top:14px}
    .chip{display:none}
    .chapters button:hover::after{display:none}
  }
</style>

<script>
const S = [
{t:"cover",k:"Cambium Academy · Course 01",h:"Intro to AI",sub:"How AI works, how it is trained, and which model to use",foot:"July 2026 edition. The AI world moves fast, so facts carry dates. Free forever, no signup."},
{t:"rows",k:"Welcome",h:"This course was built for beginners",rows:[["No background needed","If you can use a web browser, you are qualified."],["No math, no code","We build intuition with pictures and plain English."],["Jargon gets translated","Every technical term arrives with a one-line meaning."],["What you need","A web browser, about 90 minutes, and zero dollars."]]},
{t:"rows",k:"Outcomes",h:"Five things you will walk away with",rows:[["Explain AI in one sentence","And know how AI, machine learning, and generative AI relate."],["See how models really work","Tokens, neural networks, and the transformer, minus the math."],["Understand training","From a mountain of text to a helpful assistant, in four steps."],["Know the 2026 landscape","Who makes the top models and what makes each one special."],["Pick the right model","A practical cheat sheet for writing, coding, research, and more."]]},
{t:"grid",k:"Course map",h:"Six short modules, one quiz, one certificate",cls:"g3",cards:[["1","What is AI?","10 min"],["2","How models work","12 min"],["3","How models are trained","12 min"],["4","The 2026 model landscape","12 min"],["5","Which model for which job","8 min"],["6","Using AI well","8 min"]],note:"<b>Then:</b> flashcards and the hands-on AI Lab unlock the 20-question quiz. Score 70% or better and print your certificate on the spot."},
{t:"divider",n:1,h:"What is AI?",sub:"Software that learns from examples instead of following hand-written rules."},
{t:"quote",k:"Module 1 · Definition",h:"AI in one sentence",q:"Artificial intelligence is software that <em>learns patterns from examples</em> and uses them to make useful guesses about things it has never seen.",rows:[["Traditional software","A person writes every rule by hand. Breaks the moment reality gets messy."],["AI / machine learning","Show it a million examples and it finds the telltale patterns itself, including ones no human ever wrote down."]]},
{t:"grid",k:"Module 1 · The family tree",h:"AI is the family. Generative AI is the newest child.",cls:"g2",cards:[["","Artificial intelligence","Any technique that makes machines act smart, from chess engines to chatbots."],["","Machine learning","The dominant technique: learn patterns from data instead of hand-written rules."],["","Deep learning","Machine learning with many-layered neural networks. Took off in 2012."],["","Generative AI","Deep learning that creates new text, images, audio, and video. ChatGPT, Claude, and Gemini live here."]],note:"Each one sits inside the previous: generative AI is deep learning, which is machine learning, which is AI."},
{t:"rows",k:"Module 1 · A short history",h:"Seventy-five years in one slide",rows:[["1950","Alan Turing asks: can machines think?"],["1997","Deep Blue beats the world chess champion."],["2012","Deep learning wins the ImageNet vision contest."],["2017","Google publishes the Transformer paper."],["2022","ChatGPT brings AI to everyone."],["2026","AI assistants in a billion pockets."]],note:"<b>The lesson:</b> AI is not new. What changed recently is scale, data, and a 2017 invention called the transformer."},
{t:"grid",k:"Module 1 · Already everywhere",h:"You used AI before breakfast",cls:"g3",cards:[["","Spam filters","ML has guarded your inbox for 20 years."],["","Phone cameras","Every photo is cleaned up by a neural net."],["","Maps and traffic","Routes predicted from millions of trips."],["","Autocomplete","Your keyboard predicts the next word, LLM-style."],["","Recommendations","Netflix, YouTube, and Spotify picks."],["","Voice assistants","Speech to text is deep learning too."]],note:"Chatbots are simply the newest face of a technology you already trust daily."},
{t:"divider",n:2,h:"How AI models work",sub:"A language model is a prediction machine."},
{t:"quote",k:"Module 2 · The big idea",h:"One trick underneath it all: predict the next word",q:"\"The capital of France is ____\" &nbsp;&#8594;&nbsp; <em>Paris 97%</em>, Lyon 1%, ...",rows:[["Repeat the trick","Predict a word, add it to the sentence, predict again. A paragraph is thousands of predictions in a row."],["Trained on trillions of words","Good prediction quietly forces the model to absorb grammar, facts, style, and reasoning patterns."],["That is the whole magic","Essays, code, and advice all emerge from one skill: guessing the next word extremely well."]]},
{t:"rows",k:"Module 2 · Tokens",h:"AI does not read words. It reads tokens.",rows:[["A token is a chunk of text","Roughly three quarters of an English word: \"Understanding tokens\" becomes Under·stand·ing·to·kens. 1,000 tokens is about 750 words."],["Every token is just a number","The model never sees letters, only lists of numbers."],["Models have a token budget","The context window. Fill it up and the oldest content falls out of memory."],["Tokens are the currency of AI","API pricing, speed ratings, and limits are all counted in tokens."]]},
{t:"rows",k:"Module 2 · Neural networks",h:"Billions of tiny dials, tuned by practice",rows:[["Every connection is a dial","A weight: one number that gets nudged up or down during training."],["Learning = tuning the dials","Wrong guess? Nudge billions of weights so the right answer scores higher next time."],["Scale is the surprise","Frontier models have hundreds of billions of weights. Somehow, fluency emerges."]],note:"Words go in one side, flow through layers of weighted connections, and the next word comes out the other side. Nobody hand-writes any rules."},
{t:"quote",k:"Module 2 · The transformer",h:"The 2017 invention that changed everything",q:"\"The trophy did not fit in the suitcase because <em>it</em> was too big.\" Which \"it\"? <em>Attention links \"it\" to \"trophy\".</em>",rows:[["Attention: every word looks at every other word","The model learns which words matter to which, no matter how far apart they sit."],["It reads everything at once","Older AI read word by word. Transformers process whole texts in parallel, so internet-scale training became affordable."],["It is the T in GPT","Generative Pre-trained Transformer. Claude, Gemini, and Llama are transformers too."]]},
{t:"rows",k:"Module 2 · Working memory",h:"The context window: how much it can hold in mind",rows:[["Typical chat model · 200K tokens","About one long novel."],["Claude / Gemini top tiers · 1M tokens","A small bookshelf."],["Llama 4 Scout · 10M tokens advertised","Dozens of books, though independent tests find about half reliably usable."]],note:"When the window fills, the earliest content silently falls out. If a long chat gets forgetful, start a fresh one and restate what matters."},
{t:"divider",n:3,h:"How models are trained",sub:"Read everything. Learn the job. Learn manners."},
{t:"grid",k:"Module 3 · The recipe",h:"From raw internet to helpful assistant, in four steps",cls:"g2",cards:[["1","Gather data","Trillions of words: web pages, books, code, articles, transcripts."],["2","Pretrain","Predict the next token, billions of times. Absorbs language and facts."],["3","Fine-tune","Teach it to follow instructions and hold conversations."],["4","Human feedback","People rank answers. The model learns what helpful and safe look like."]],note:"Steps 1 and 2 build a brilliant autocomplete. Steps 3 and 4 turn it into an assistant."},
{t:"stats",k:"Module 3 · The price tag",h:"Why only a handful of labs train frontier models",stats:[["Months","of continuous training for one frontier run"],["10,000s","of specialized GPU chips running in parallel"],["$100M+","estimated cost of a single frontier training run"],["10x cheaper","open models like DeepSeek V4 now match top tiers at a fraction of the serving cost"]]},
{t:"grid",k:"Module 3 · Why chatbots feel human",h:"Same brain, before and after finishing school",cls:"g2",cards:[["","Base model","A brilliant autocomplete with no manners. Ask \"How do I bake bread?\" and it may continue: \"...asked Jim, who had baked for years.\" It was never taught to answer."],["","After fine-tuning + feedback","Answers the actual question step by step, declines harmful requests, and admits uncertainty instead of bluffing."]],note:"This finishing school is why talking to AI feels natural."},
{t:"rows",k:"Module 3 · The catch",h:"Why AI confidently makes things up",rows:[["It always answers with the most plausible words","Plausible is not the same as true. There is no built-in fact checker."],["Gaps get filled smoothly","Ask about something it does not know and it may invent names, dates, citations, or numbers that merely sound right."],["Modern tools fight back","Web search, citations, and reasoning modes reduce hallucinations. They do not eliminate them."]],warn:"<b>The one rule to remember:</b> trust, but verify. Check every name, number, date, and citation before you rely on it."},
{t:"divider",n:4,h:"The 2026 model landscape",sub:"A handful of labs, two philosophies."},
{t:"grid",k:"Module 4 · The big split",h:"Closed weights or open weights",cls:"g2",cards:[["","Closed weights","You use the model as a service; the recipe stays secret. GPT, Claude, Gemini, Grok. Usually the strongest and easiest, but you need their servers."],["","Open weights","You can download the model and run it yourself. Llama, DeepSeek, Qwen, Mistral. Free, private, offline. You bring the hardware."]]},
{t:"grid",k:"Module 4 · The frontier three",h:"OpenAI, Anthropic, Google",cls:"g3",cards:[["","OpenAI · GPT","GPT-5.5 now, 5.6 rolling out July 2026. The most-used AI on earth; new chips serve replies at up to 750 tokens a second. Free: ChatGPT free tier."],["","Anthropic · Claude","Sonnet 5 free, Opus 4.8, new Fable 5 on top. Careful long-form work, top coding via Claude Code, million-token context. Free: claude.ai."],["","Google · Gemini","Gemini 3.1 Pro and 3.5 Flash. Woven through Search and Docs; broadest free tier with images, voice, and Deep Research. Free: Gemini app."]]},
{t:"grid",k:"Module 4 · More heavyweights",h:"Meta, xAI, DeepSeek, Mistral",cls:"g2",cards:[["","Meta","New flagship Muse Spark is closed, a strategy shift. Open Llama 4 remains, 10M-token context on Scout. Free inside WhatsApp and Instagram."],["","xAI · Grok","Grok 4.3 taps the live X firehose, takes video input, holds a million tokens. Free tier is thin."],["","DeepSeek","Open V4 matches top-tier benchmarks at roughly a tenth of the serving cost. Generous free app; hosted in China, so mind your data."],["","Mistral","Europe's champion. Mistral Large 3 is the largest fully open (Apache 2.0) Western model. Free casual use via its chat app."]]},
{t:"grid",k:"Module 4 · The open-weights wave",h:"The strongest free models now come from open labs",cls:"g3",cards:[["","Qwen 3.5 / 3.6 · Alibaba","Open family in every size from 0.8B to 397B parameters. Excellent multilingual skills."],["","Kimi K2.6 · Moonshot","Around a trillion parameters, open, a favorite for agentic coding on a budget."],["","GLM-5.2 · Z.ai","MIT licensed, million-token context, rivals Western flagships on coding benchmarks."]],note:"<b>Worth knowing:</b> these labs are China-based. World class and free, but hosted chats fall under Chinese data rules. For sensitive work, run the weights locally."},
{t:"stats",k:"Module 4 · The scale of it",h:"Four numbers from 2026",stats:[["1B+","monthly ChatGPT app users by June 2026, the fastest app ever to get there"],["900M","monthly users of Google's Gemini app by May 2026"],["5B","images created with Gemini's Nano Banana tool in about two months"],["$965B","Anthropic's May 2026 valuation, briefly the highest of any AI lab"]],note:"Sources and dates for every figure are on the <a href='../resources.md'>resources page</a>."},
{t:"rows",k:"Module 4 · Open weights, your machine",h:"You can run a real AI model on your own computer",rows:[["Install Ollama, pick a model","Ollama is a free app for Windows, Mac, and Linux that downloads and runs open models with one command."],["Everything stays local","No internet needed after download. Nothing you type leaves your machine. Cost: zero, forever."],["Small models got good","Qwen3 4B or 8B suits most laptops. Gemma 3 and Phi-4-mini shine on lighter hardware."]],warn:"<b>Honest trade-off:</b> local models are noticeably weaker than the frontier. Perfect for private notes, drafts, and learning. Not for your hardest problems."},
{t:"divider",n:5,h:"Which model for which job?",sub:"There is no single best model. There is a best model for each job."},
{t:"table",k:"Module 5 · Cheat sheet, part 1",h:"Words and work",head:["Your job","Reach for","Also great"],rowsT:[["Everyday writing and Q&A","ChatGPT, free tier","Claude Sonnet 5, often the more natural writer"],["Coding","Claude with Claude Code","DeepSeek V4 or Kimi K2.6, strong and free"],["Research with sources","Perplexity, free, cites as it answers","Gemini Deep Research, about 5 free reports a month"],["Long documents","Claude, million-token context","Gemini 3.1 Pro, 1M context plus Docs and Drive"]],note:"Snapshot: July 2026. Free tiers and model names shift often."},
{t:"table",k:"Module 5 · Cheat sheet, part 2",h:"Media, privacy, and the best free picks",head:["Your job","Reach for","Also great"],rowsT:[["Images","Gemini's Nano Banana, free","Midjourney, paid, for fine art control"],["Video clips","Google Veo 3.1, 4K with sound","Kling 3.0, cheaper per clip"],["Voice and speech","ElevenLabs, free tier","ChatGPT voice mode, simple and bundled"],["Private and offline","Qwen3 via Ollama, local","Gemma 3 or Phi-4-mini on light hardware"],["Best free overall","Gemini free tier, broadest features","ChatGPT free tier, easiest to get help with"]]},
{t:"rows",k:"Module 5 · A 10-second decision",h:"Four questions beat any leaderboard",rows:[["Is the data sensitive?","Run an open model locally, or use a paid plan with training turned off."],["Do you need checkable sources?","Use a research tool that cites: Perplexity or Deep Research."],["Is the input huge?","Pick a million-token context model: Claude or Gemini."],["Just everyday help?","Any of the big three free tiers is excellent. Stop optimizing."]],note:"<b>Best advice:</b> pick one model and learn it deeply. Prompting skill transfers everywhere; tool-hopping does not compound."},
{t:"divider",n:6,h:"Using AI well",sub:"The human stays in charge."},

const CHAPTERS = [[1,"Welcome"],[5,"Module 1 · What is AI?"],[10,"Module 2 · How models work"],[16,"Module 3 · Training"],[21,"Module 4 · The landscape"],[28,"Module 5 · Which model"],[32,"Module 6 · Using AI well"],[36,"Quiz & certificate"]];
const slideEl = document.getElementById('slide'), bar = document.getElementById('bar'), count = document.getElementById('count');
let i = Math.min(Math.max(parseInt(location.hash.slice(1)) || 1, 1), S.length) - 1;

const chapEl = document.getElementById('chapters');
chapEl.innerHTML = CHAPTERS.map(ch => `<button data-s="${ch[0]}" data-t="${ch[1]}"></button>`).join("");
chapEl.querySelectorAll('button').forEach(b => b.addEventListener('click', () => { i = +b.dataset.s - 1; render(); }));

function chipHtml(){ return '<div class="chip"><img src="../../../assets/logo-mark@2x.png" alt=""></div>'; }
function render(){
  const s = S[i];
  let h = "";
  const dark = (s.t === "cover" || s.t === "divider" || s.t === "close");
  slideEl.className = "slide" + (dark ? " dark" : "");
  if (s.t === "cover") {
    h = `<div class="kicker" style="margin-top:6%">${s.k}</div><h1 style="font-size:clamp(38px,7vw,72px);background:linear-gradient(180deg,#FFFDF6,#CFE3BF);-webkit-background-clip:text;background-clip:text;color:transparent">${s.h}</h1><div class="sub" style="max-width:78%">${s.sub}</div><div class="foot">${s.foot}</div>${chipHtml()}`;
  } else if (s.t === "divider") {
    h = `<div class="wm">${s.n}</div><div class="kicker" style="margin-top:9%">Module ${s.n} of 6</div><h1 style="font-size:clamp(30px,5.4vw,54px);color:#FFFDF6">${s.h}</h1><div class="sub" style="max-width:74%">${s.sub}</div><div class="foot">Cambium Academy · Course 01</div>${chipHtml()}`;
  } else if (s.t === "close") {
    h = `<div class="kicker" style="margin-top:3%">${s.k}</div><h1 style="color:#FFFDF6">${s.h}</h1><div class="rows" style="margin-top:16px">` +
      s.rows.map(r => `<div class="row"><div class="dot"></div><div><b>${r[0]}</b><span>${r[1]}</span></div></div>`).join("") +
      `</div><div style="margin-top:18px"><a href="${nextStep().href}" style="display:inline-block;background:linear-gradient(135deg,#D9B25C,#B98A2D);color:#1F3D24;font-weight:800;padding:12px 26px;border-radius:10px;text-decoration:none;box-shadow:0 6px 20px rgba(217,178,92,.35)">${nextStep().label}</a></div><div class="foot">${s.foot}</div>${chipHtml()}`;
  } else {
    h = `<div class="kicker">${s.k}</div><h2 class="stitle">${s.h}</h2>`;
    if (s.q) h += `<div class="quote">${s.q}</div>`;
    if (s.rows) h += `<div class="rows">` + s.rows.map(r => `<div class="row"><div class="dot"></div><div><b>${r[0]}</b><span>${r[1]}</span></div></div>`).join("") + `</div>`;
    if (s.cards) h += `<div class="grid ${s.cls || 'g3'}">` + s.cards.map(c => `<div class="card">${c[0] ? `<div class="cnum">${c[0]}</div>` : ""}<b>${c[1]}</b><p>${c[2] || ""}</p></div>`).join("") + `</div>`;
    if (s.stats) h += `<div class="stats">` + s.stats.map(x => `<div class="stat"><div class="v">${x[0]}</div><p>${x[1]}</p></div>`).join("") + `</div>`;
    if (s.rowsT) h += `<table><tr>${s.head.map(x => `<th>${x}</th>`).join("")}</tr>` + s.rowsT.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join("")}</tr>`).join("") + `</table>`;
    if (s.note) h += `<div class="note">${s.note}</div>`;
    if (s.warn) h += `<div class="note warn">${s.warn}</div>`;
  }
  slideEl.innerHTML = h;
  slideEl.style.animation = "none";
  void slideEl.offsetWidth;
  slideEl.style.animation = "";
  count.innerHTML = "<b>" + (i + 1) + "</b> · " + S.length;
  bar.style.width = (100 * (i + 1) / S.length) + "%";
  document.getElementById('prev').disabled = i === 0;
  document.getElementById('next').disabled = i === S.length - 1;
  chapEl.querySelectorAll('button').forEach(b => {
    const st = +b.dataset.s;
    b.className = (i + 1) >= st && (CHAPTERS.find(c => c[0] > st) ? (i + 1) < CHAPTERS.find(c => c[0] > st)[0] : true) ? "on" : ((i + 1) > st ? "past" : "");
  });
  history.replaceState(null, "", "#" + (i + 1));
  slideEl.scrollTop = 0;
}
function nextStep(){
  try {
    var rd = k => { try { return JSON.parse(localStorage.getItem(k) || "{}"); } catch(e){ return {}; } };
    var cards = Object.keys(rd("cambium-c01-cards")).length;
    var pg = rd("cambium-c01-playground");
    var labs = ["tok","lm","net"].filter(k => pg[k]).length;
    if (cards < 24) return { href: "flashcards.html", label: "Continue the path &#8594; flashcards" };
    if (labs < 3)   return { href: "playground.html", label: "Continue the path &#8594; the AI Lab" };
    return { href: "quiz.html", label: "The quiz is unlocked &#8594; take it now" };
  } catch(e) { return { href: "flashcards.html", label: "Continue the path &#8594; flashcards" }; }
}
function go(d){ i = Math.min(Math.max(i + d, 0), S.length - 1); render(); }
document.getElementById('prev').onclick = () => go(-1);
document.getElementById('next').onclick = () => go(1);
document.addEventListener('keydown', e => {
  if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") { e.preventDefault(); go(1); }
  if (e.key === "ArrowLeft" || e.key === "PageUp") { e.preventDefault(); go(-1); }
});
let tx = null;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (tx === null) return;
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 60) go(dx < 0 ? 1 : -1);
  tx = null;
});
render();
</script>
<script src="checkpoints.js"></script>
<script src="aira.js"></script>
</body>
