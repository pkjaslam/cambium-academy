<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cambium Academy board</title>
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
</style>
</head>
<body>
<!--
  One isolated giscus board per iframe. giscus does NOT support multiple instances in a
  single document (the 2nd/3rd fail with "Failed to fetch"), so each community board on
  community.html embeds THIS page in its own iframe. Params come from the URL query.
  The page reports its height to the parent so the outer iframe can size to fit.
-->
<script>
(function () {
  var p = new URLSearchParams(location.search);
  if (!p.get("repoId") || !p.get("catId")) return;
  var s = document.createElement("script");
  s.src = "https://giscus.app/client.js";
  s.async = true; s.crossOrigin = "anonymous";
  var attrs = {
    "data-repo": p.get("repo"),
    "data-repo-id": p.get("repoId"),
    "data-category": p.get("cat"),
    "data-category-id": p.get("catId"),
    "data-mapping": "specific",
    "data-term": p.get("term"),
    "data-strict": "0",
    "data-reactions-enabled": "1",
    "data-emit-metadata": "0",
    "data-input-position": "top",
    "data-theme": "light",
    "data-lang": "en"
  };
  for (var k in attrs) s.setAttribute(k, attrs[k]);
  document.body.appendChild(s);

  // Tell the parent how tall we are, so it can size the outer iframe (no inner scrollbar).
  var last = 0;
  function reportHeight() {
    var h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight);
    if (h && Math.abs(h - last) > 2 && parent && parent !== window) {
      last = h;
      parent.postMessage({ cambiumBoard: p.get("term"), height: h }, "*");
    }
  }
  if (window.ResizeObserver) { try { new ResizeObserver(reportHeight).observe(document.body); } catch (e) {} }
  window.addEventListener("load", reportHeight);
  setInterval(reportHeight, 1200); // fallback: keep in sync as giscus loads/resizes
})();
</script>
</body>
</html>
