{"t":"rows","k":"The thread · Riverbend, part 1","h":"One real question, ten instruments","rows":[["The question","\"Do 30 metre riparian buffers protect cold-water fish in harvested catchments, and is our current 15 metre rule defensible?\" A real decision, with money and a river on the line."],["Why a thread","Every module from here applies ONE instrument to THIS question, so you see the whole pipeline, not ten disconnected demos."],["Bring your own","Substitute your question as we go. The instruments do not care about the field; the sequence is the same in ecology, medicine, education, or economics."]],"note":"<b>Riverbend</b> is a composite case built from ordinary forestry practice. Follow it, or run yours alongside it."},

{"t":"rows","k":"Module 2 · The recipe, upgraded for science","h":"Context. Deliverable. Format. Uncertainty.","rows":[["Context: what it cannot guess","Your field, your data, your constraints, what you already tried, what good looks like."],["Deliverable: a job, not a topic","\"Draft a limitations paragraph for THIS design\" beats \"tell me about limitations.\""],["Format: the exact shape","Word limit, structure, citation style, table columns. Cheap to say, transformative to get."],["Uncertainty: demanded, every time","One standing sentence: \"Flag what you are not sure of and what I must verify.\""]],"note":"The fourth line is the researcher's upgrade. It converts a confident narrator into an honest assistant, and it costs you nothing."},

{"t":"rows","k":"Module 2 · Researcher patterns","h":"Four prompts that earn their keep","rows":[["\"Act as reviewer 2\"","Attack this abstract: clarity, overclaims, missing limitations. Tireless and shameless, in private."],["\"List the assumptions you just made\"","Run after any analysis or summary. The list is where the errors live."],["\"Give the opposing interpretation\"","Forces the model off your side of the argument, which is where you are blindest."],["\"What would falsify this?\"","The most scientific sentence you can say to a machine."]],"note":"Notice none of these are magic words. They are the questions a good committee asks, made cheap."},
{"t":"rows","k":"Module 2 · The persona finding still holds","h":"Roles shape tone, not truth","rows":[["\"You are a world-class statistician\" changes the costume","Style, vocabulary, confidence: yes. Factual accuracy: measured slightly WORSE in testing."],["For facts and stats, ask plainly","Plain question, full context, demanded uncertainty."],["Save personas for voice","\"Explain this to a first-year cohort\" is a legitimate style instruction."]],"note":"Carried from Course 02, where the 2026 evidence is walked through slide by slide."},

{"t":"rows","k":"The thread · Riverbend, part 2","h":"Prompting the question into shape","rows":[["The weak ask","\"Tell me about riparian buffers.\" A topic, not a job. It returns an encyclopedia paragraph."],["The briefed ask","\"I manage 8 harvested catchments in the interior Northwest. Summarize the evidence on buffer width and summer stream temperature for cold-water salmonids, distinguish causal studies from correlational ones, flag what you are unsure of, and tell me what I must verify.\""],["What changed","Context, exact deliverable, an evidence-quality demand, and the uncertainty clause. Same seconds to type."]],"note":"That last clause is why Riverbend's answers arrive with hedges in the right places instead of confident mush."},

{"t":"rows","k":"Module 3 · The academic specialists","h":"Why Elicit and Undermind beat the generalists here","rows":[["They search closed, verified paper databases","Not the open web. The corpus is published research, so citations resolve by construction."],["They speak researcher","Screening columns, effect extraction, PRISMA-style workflows, exportable tables."],["The generalists still matter","For breadth beyond papers: policy, preprints, datasets, news, code."]],"note":"<b>Rule of thumb:</b> literature review means academic agent first, generalist second. Everything else means the reverse."},

{"t":"grid","k":"Module 4 · The verification kit","h":"Read across, not down","cls":"g2","cards":[["S","Stop","Do you actually know this source and this claim?"],["I","Investigate the source","New tab. Who is behind this? Thirty seconds."],["F","Find better coverage","Search the claim itself. Do independent sources report it?"],["T","Trace to the original","Follow the stat upstream. Context changes everything."]],"note":"Lateral reading: leave the page and let independent sources judge it. Faster AND more reliable than staring harder."},
{"t":"quote","k":"Module 4 · The rule in stone","h":"The only rule this course carves","q":"A citation you never opened is a citation you cannot trust.","rows":[["Click 1: does it exist?","Scholar or the DOI. No result is your answer."],["Click 2: is it what it claims?","Right authors, right venue, right year. Fakes borrow real titles with wrong details."],["Click 3: does it say what the AI said?","Open the abstract. Misattribution is the subtlest fake of all."]],"note":"Thirty seconds per citation that matters. The AI Lab's Citation Hunt makes this a reflex, with score and streaks."},
{"t":"rows","k":"Module 4 · Try it now","h":"Play the Lab, then hunt in the wild","rows":[["Win Citation Hunt, Lateral Race, and Receipts-or-Vibes","The Lab's first three games train exactly this module."],["Then ask any chatbot for three sources on a niche topic you know","Fakes cluster where training data is thin."],["Open all three","Many researchers meet their first fabricated citation inside five minutes. It changes how you read forever."]]},
{"t":"rows","k":"The thread · Riverbend, part 4","h":"The audit that saved the report","rows":[["The conclusion rested on two sources","A width-and-temperature experiment, and a five-year fish-persistence study. Everything else was context."],["Three clicks each","The first resolved and matched. The second: real paper, real authors, but the report's claim overstated what the abstract actually said."],["The correction","One sentence rewritten, one citation kept honest. That single audit is the difference between a defensible recommendation and a retraction."]],"warn":"<b>This is the Practical.</b> The honors exam makes you do exactly this, against the live Crossref registry."},
{"t":"divider","n":5,"h":"Design before data","sub":"The cheapest AI hour in your whole project, and the one nobody uses."},
{"t":"rows","k":"Module 5 · The upstream advantage","h":"Consult the machine before the data exists","rows":[["Power and sample size, sanity-checked","Before you commit a season of fieldwork to an underpowered design."],["Test selection with assumptions stated","\"Which analysis fits this design, and what must be true for it to be valid?\""],["Confound hunting","\"List the confounds a hostile reviewer would raise for this design.\""],["Pre-registration drafting","Hypotheses, exclusions, and the analysis plan, written down before temptation exists."]],"note":"Errors here are silent and permanent. No amount of clever analysis rescues a broken design, which is why this hour is the cheapest one."},
{"t":"quote","k":"Module 5 · The consulting rule","h":"Show the math or it did not happen","q":"\"Give me the sample size, AND the formula, AND every assumption behind it, then say what would change if each assumption is wrong.\"","rows":[["Numbers without derivations are vibes","A power calculation you cannot inspect is a guess wearing a lab coat."],["Cross-check with a second tool","Two independent calculations that agree are worth ten confident ones."],["Then take it to a human when stakes are high","AI is the tireless first consult, not the sign-off."]],"note":"The statistics remain yours. \"The AI chose the test\" is not a methods section."},
{"t":"rows","k":"Module 5 · Try it now","h":"Stress-test your next study in ten minutes","rows":[["Describe the study in six sentences","Question, design, sample, measures, analysis, constraint."],["Ask for the three most likely fatal flaws","And the sample size math, shown in full."],["Ask what a hostile reviewer would propose instead","You do not have to agree. You have to have heard it before they say it."]]},
{"t":"rows","k":"The thread · Riverbend, part 5","h":"Designing the field season","rows":[["The consult","\"Paired catchments, 15 m versus 30 m buffers, summer temperature and fish counts. What design, what n, what confounds?\""],["What it caught","Elevation and aspect confounding, pseudoreplication if catchments are treated as independent samples, and a power calculation showing 6 pairs is underpowered for the fish endpoint."],["What it could not do","Sign off. The statistician did, after seeing the shown math."]],"note":"Cost of this consult: twenty minutes. Cost of discovering it in year three: a season, and a defensible answer you no longer have."},
{"t":"divider","n":6,"h":"Analyze: your AI data analyst","sub":"Plain English in. Working analysis out. Your judgment in between."},
{"t":"rows","k":"Module 6 · This is not autocomplete anymore","h":"What 2026 assistants actually see and do","rows":[["Posit Assistant sees your dataframe, your code, AND your rendered plot","Purpose-built for data work in Positron and RStudio, reasoning across R and Python in one analysis."],["Agentic assistants navigate whole repositories","Claude Code and Copilot agents read, run, and revise multi-file analyses."],["Browser analysts run plain-English analyses","Julius and ChatGPT execute code on your uploaded data and hand back plots."],["MATLAB ships its own AI chat","The big proprietary stacks are in the same race."]],"note":"The interface stopped being autocomplete and became a colleague who can see your screen. The safety rules change accordingly."},
{"t":"rows","k":"Module 6 · The safe loop","h":"Five steps that keep you the analyst","rows":[["Describe data + goal + constraints","Column meanings, units, what a row is, what success looks like."],["Require commented code","Every block explains itself, in your language of choice."],["The explain-it-back rule","AI walks through every line before you run anything."],["The tiny-test rule","Run on ten rows you can verify by hand. Then, and only then, scale."],["Keep the transcript","The conversation IS your analysis log. Save it with the code."]],"warn":"<b>Where it silently fails:</b> plausible-but-wrong test choices, hallucinated function arguments, silent unit and join errors. Every failure mode above is caught by the loop's steps 3 and 4."},
{"t":"rows","k":"Module 6 · The qualitative lane","h":"Half of research is not a spreadsheet","rows":[["Transcription is effectively solved","Whisper-class models turn interview hours into text in minutes, including accents and crosstalk that used to cost transcription budgets."],["Thematic coding: AI proposes, you adjudicate","First-pass themes and codings at scale, with every decision logged. The interpretive authority stays human."],["Survey open-ends at scale","Thousands of free-text responses, clustered and quantified in an afternoon."]],"note":"Keep an audit trail of accepted and rejected codings. \"The AI coded it\" is not a methodology; \"AI-assisted coding with human adjudication, trail attached\" is."},
{"t":"rows","k":"Module 6 · Try it now","h":"The messy CSV challenge","rows":[["Hand an assistant your messiest real CSV","With a plain-English description of what each column means."],["Ask for cleaning plus one labeled plot","In R or Python, every step commented, explained back before running."],["Run the tiny test first","Ten rows, hand-checked. Then the full file."]]},
{"t":"rows","k":"The thread · Riverbend, part 6","h":"The analysis, explained back","rows":[["Plain English in","\"Loggers with 15-minute temperature readings, one row per logger-hour, 12 catchments, buffer width per catchment. Model summer maximum temperature by buffer width, accounting for catchment.\""],["The assistant's first answer","A simple regression that silently ignored the nesting: every logger-hour treated as independent. Plausible, publishable-looking, and wrong."],["The loop caught it","Explain-it-back surfaced the assumption; the tiny test on one catchment made the error visible; the fix was a mixed model with catchment as a random effect."]],"warn":"This is the exact failure mode from Module 6, in the wild: <b>plausible-but-wrong statistical structure</b>. Nothing but explain-it-back catches it."},
{"t":"divider","n":7,"h":"See and hear","sub":"Machine eyes for your figures and field notes. A voice for your paper library."},
{"t":"rows","k":"Module 7 · What machine eyes can do now","h":"Multimodal AI for research material","rows":[["Extract numbers from published charts","Digitize the figure from that 1998 paper nobody has the data for."],["First-pass reads of micrographs and maps","Descriptions, counts, anomalies, at triage speed."],["Transcribe handwritten field notebooks","Including the writing you can barely read yourself."],["Pull tables out of photos and PDFs","The eternal scanned-appendix problem, mostly solved."]],"warn":"<b>The measured limit:</b> vision models still misidentify fine-grained structures in cluttered scientific imagery that trained experts catch. Brilliant interns with astigmatism: fast, useful, and never the final reader."},
{"t":"rows","k":"Module 7 · The two vision rules","h":"Hypothesis, then spot-check","rows":[["Every extracted number gets spot-verified","Check a sample against the source before any extracted dataset enters your analysis."],["Every identification is a hypothesis","A model calling a structure on a micrograph is a lead for the expert, never a result for the paper."]],"note":"Used this way, machine eyes are a triage superpower with zero downside. Skipped, they are a retraction generator."},
{"t":"rows","k":"Module 7 · Your library, talking back","h":"Source-grounded assistants (the NotebookLM class)","rows":[["Upload your papers, ask questions, get cited answers","Answers ground in YOUR corpus, not in training memory, and cite back to the page."],["Audio overviews you can interrupt","Podcast-style discussions of your sources, in formats from brief to critical debate, that take your questions mid-conversation."],["Maps, decks, and quizzes on demand","The library becomes study materials while you commute."]],"note":"NotebookLM is the flagship demo; the CAPABILITY, source-grounded Q&A over your own corpus, is the thing to learn. Products rotate."},
{"t":"quote","k":"Module 7 · Why grounding matters","h":"Containment, not elimination","q":"A source-grounded answer can still be wrong, but it is wrong INSIDE a corpus you can check, with citations that point at pages you own.","rows":[["Open chat free-associates from memory","Its errors can come from anywhere, so checking means searching the world."],["Grounded chat errs inside your uploads","Checking means opening the cited page. The error surface shrinks by orders of magnitude."]],"note":"This is the same receipts principle from Module 3, applied to your own bookshelf."},
{"t":"rows","k":"Module 7 · Try it now","h":"One page, one chart, one podcast","rows":[["Photograph a handwritten page and a published chart","Ask for transcription and extracted values. Count the errors yourself."],["Upload three papers from your field","Generate a critical-format audio overview."],["Interrupt it","Ask the question you would ask the authors. That moment sells the whole module."]]},
{"t":"rows","k":"The thread · Riverbend, part 7","h":"The figures and the field notebook","rows":[["Machine eyes on the old data","A 1998 report's temperature figure, with no data behind it, digitized in minutes and spot-checked against three visible gridlines."],["The notebook","Three field seasons of handwriting transcribed; two site codes misread and caught on review. Machine eyes are fast, not final."],["The library","All 40 screened papers uploaded to a source-grounded assistant; a critique-format audio overview listened to on the drive between sites."]],"note":"None of these are the analysis. All of them are hours you get back."},
{"t":"divider","n":8,"h":"Write: drafts, translation, grants, review","sub":"The most-used AI research task on earth, and the most policed."},
{"t":"rows","k":"Module 8 · The legitimate power tools","h":"What writing help looks like when it is honest","rows":[["Revision and clarity passes","Tighten, restructure, de-jargon: your ideas, better sentences."],["Translation and English polishing","The great equalizer for non-native speakers, and at many venues it now counts as exempt copy-editing. Check YOUR venue."],["The unglamorous fleet","Abstracts, cover letters, plain-language summaries, response-to-reviewers scaffolds."],["Grant support","Aims critiqued, reviewer simulated, boilerplate drafted. The science stays yours; NIH has signaled AI-substantially-written proposals can be rejected."]],"note":"The line that never moves: AI assists the writing. You remain the author, and the author answers for every sentence."},
{"t":"grid","k":"Module 8 · The policy table (July 2026)","h":"The rules now differ FOR REAL","cls":"g2","cards":[["","Science","Disclosure of ALL AI use required, in the acknowledgments. Including copy editing."],["","Nature portfolio","Copy-editing exempt from disclosure; AI-generated images banned; methods-level disclosure for substantive use."],["","Elsevier","Dedicated declaration section for generative AI in the writing process; no AI authorship."],["","NIH","Reviewers barred from feeding applications to AI; proposals substantially written by AI can be rejected."]],"warn":"One-size-fits-all advice about AI writing is now wrong by construction. The habit is: check the venue's actual policy page at submission time, every time."},
{"t":"quote","k":"Module 8 · Pre-review yourself","h":"Reviewer 2, on demand, in private","q":"\"Attack this manuscript as a skeptical reviewer: clarity, methods gaps, statistical red flags, overclaimed conclusions, missing limitations. Be specific and merciless.\"","rows":[["It is tireless and shameless","Exactly what you want BEFORE humans see it."],["It is already on the other side too","Roughly 21% of reviews at a major AI conference were flagged as substantially AI-written, and ~12% of review text at a major journal family."],["So assume a hybrid audience","Write for humans, and expect machines to read you first."]]},
{"t":"rows","k":"Module 8 · The red lines","h":"Where writing help becomes misconduct","rows":[["Never upload someone ELSE'S unpublished work","Manuscripts and grants you review are confidential. NIH bars reviewers from feeding applications to AI, full stop."],["Never let AI invent citations, data, or quotes","Module 4 taught you exactly how convincingly it will."],["Never skip the venue's declaration","Disclosure costs a sentence. Discovery costs a reputation."]],"note":"Try it tonight: paste YOUR abstract, ask for the three harshest justified referee comments, and fix one before bed."},
{"t":"rows","k":"The thread · Riverbend, part 8","h":"Writing it, and surviving review","rows":[["The pre-review","AI as reviewer 2 flagged an overclaim in the abstract, a missing limitation about generalizing beyond the interior Northwest, and one unclear methods sentence."],["The translation","A co-author's section, drafted in their second language, polished without changing a single claim."],["The disclosure","The journal was Elsevier: a dedicated declaration section, one sentence, written and attached before submission."]],"warn":"Reviewer 2, the human one, raised the same limitation. It was already addressed. That is what pre-review buys."},
{"t":"divider","n":9,"h":"Reproducible and intact","sub":"Analyses anyone can rerun. References anyone can open."},
{"t":"rows","k":"Module 9 · The two quiet crises","h":"And the assistant that fixes both, if asked","rows":[["Crisis one: analyses nobody can rerun","Undocumented scripts, unpinned environments, the folder called final_v2_REAL."],["Crisis two: reference lists nobody checked","Module 4 measured this one: 1 in 277 papers and rising."],["The fix costs one sentence each","The same assistant that wrote your analysis will write the README, pin the environment, and document the workflow. Most people never ask."]],"note":"Reproducibility went from a virtue to a prompt. \"Document this script, list dependencies with versions, and write a README a stranger could follow\" takes eleven seconds to type."},
{"t":"rows","k":"Module 9 · The reproducibility asks","h":"Four prompts for your existing code","rows":[["\"Document every function and non-obvious line\"","Comments a stranger, including future-you, can follow."],["\"Pin this environment\"","requirements.txt, renv, or a container recipe, with versions."],["\"Turn this session into a script\"","Interactive spelunking becomes a rerunnable pipeline."],["\"Write the README\"","Data expected, steps to run, outputs produced, one page."]],"note":"AI drafts, you correct. The audit trail from Module 6's safe loop completes the package."},
{"t":"quote","k":"Module 9 · Reference integrity","h":"The two nevers","q":"Never hand-type a citation. And never trust an AI-typed one.","rows":[["Import from the source of record","Zotero pulls metadata from Crossref and publishers; Better BibTeX keeps keys stable."],["AI plugins are a reading layer, not a source","Beaver and PapersGPT-class tools chat over your library; the BIBLIOGRAPHIC RECORD still comes from the registry."],["The final gate: DOIs resolve","One pass before submission: every DOI opens, every entry matches. Minutes, not hours."]],"note":"BibTeX generated from a model's memory is Module 4's fabrication problem wearing a bow tie."},
{"t":"rows","k":"Module 9 · Try it now","h":"Two checks on your current project","rows":[["Have AI document one existing script","Then correct its two wrong guesses. That correction IS the documentation working."],["Run your reference list through a DOI check","Count the casualties. Almost every list has at least one."]]},
{"t":"rows","k":"The thread · Riverbend, part 9","h":"Making it rerunnable","rows":[["The documentation","The assistant wrote the README and pinned the environment; the analyst corrected two wrong guesses about the data dictionary."],["The references","Every DOI resolved before submission. One entry, inherited from an old draft, did not. It was fabricated, three years old, and nobody had ever opened it."],["The result","An analysis a stranger can rerun, and a reference list that survives scrutiny."]]},
{"t":"divider","n":10,"h":"Responsible AI, and your personal stack","sub":"The capstone: judgment, written down."},
{"t":"stats","k":"Module 10 · The gap where careers get hurt","h":"Disclosure, measured","stats":[["~70%","of journals now have an explicit AI policy"],["~0.1%","of 75,000 recent papers actually disclosed AI use"],["1 sentence","is what proper disclosure usually costs"],["4 rules","Find well. Verify well. Cite well. Disclose well."]],"note":"That gap will close, and it will close on the disclosers' terms. Be early."},
{"t":"rows","k":"Module 10 · The working code","h":"Five lines to work by","rows":[["Verify before you rely","Every load-bearing claim, number, and citation. You know all the checks now."],["Disclose per the venue's ACTUAL rule","Module 8's table, checked fresh at submission."],["Guard sensitive data absolutely","Confidential, pre-publication, human-subjects data never touches a cloud chatbot. Local and institution-hosted models exist exactly for this."],["Watch the bias","Training data shapes answers: languages, regions, and fields are not equally represented. Ask what is missing."],["You remain the accountable author","Every instrument in this course assists. None of them signs."]],"warn":"<b>The sensitive-data line is hard.</b> If your data could not go in an email to a stranger, it does not go in a consumer chatbot. When in doubt: local model, institutional deployment, or synthetic stand-in data."},
{"t":"grid","k":"Module 10 · The capstone","h":"Build your personal stack, one page","cls":"g3","cards":[["1","Discover","Your agent + your map tool + one alert"],["2","Design + analyze","Your methods consult + your coding assistant"],["3","See, hear, write","Your vision tool, library assistant, and writing setup"],["4","Reproduce","Your documentation habit + reference pipeline"],["5","Red lines","Your venue's disclosure rule + your data rules, written down"],["6","Free tiers marked","So the stack survives a $0 month"]],"note":"<b>This page is the deliverable.</b> Tools on it will rotate; the shape of it will not. The certificate says you can pick instruments with judgment, not that you memorized this month's names."},

const CHAPTERS = [[1,"Welcome"],[5,"Module 1 · The 2026 research stack"],[11,"Module 2 · Prompting for researchers"],[18,"Module 3 · Discover: the literature pipeline"],[26,"Module 4 · Trust: the citation trap"],[33,"Module 5 · Design before data"],[38,"Module 6 · Analyze: your AI data analyst"],[44,"Module 7 · See and hear"],[51,"Module 8 · Write: drafts, translation, grants, review"],[57,"Module 9 · Reproducible and intact"],[63,"Module 10 · Responsible AI, and your personal stack"],[68,"Checklist & quiz"]];
const slideEl = document.getElementById('slide'), bar = document.getElementById('bar'), count = document.getElementById('count');
let i = Math.min(Math.max(parseInt(location.hash.slice(1)) || 1, 1), S.length) - 1;

const chapEl = document.getElementById('chapters');
chapEl.innerHTML = CHAPTERS.map(ch => `<button data-s="${ch[0]}" data-t="${ch[1]}"></button>`).join("");
chapEl.querySelectorAll('button').forEach(b => b.addEventListener('click', () => { i = +b.dataset.s - 1; render(); }));

function chipHtml(){ return '<div class="chip"><img src="../../../assets/logo-mark@2x.png" alt=""></div>'; }
function render(){
  const s = S[i];
  let h = "";
  const dark = (s.t === "cover" || s.t === "divider" || s.t === "close");
  slideEl.className = "slide" + (dark ? " dark" : "");
  if (s.t === "cover") {
    h = `<div class="kicker" style="margin-top:6%">${s.k}</div><h1 style="font-size:clamp(38px,7vw,72px);background:linear-gradient(180deg,#FFFDF6,#CFE3BF);-webkit-background-clip:text;background-clip:text;color:transparent">${s.h}</h1><div class="sub" style="max-width:78%">${s.sub}</div><div class="foot">${s.foot}</div>${chipHtml()}`;
  } else if (s.t === "divider") {
    h = `<div class="wm">${s.n}</div><div class="kicker" style="margin-top:9%">Module ${s.n} of 6</div><h1 style="font-size:clamp(30px,5.4vw,54px);color:#FFFDF6">${s.h}</h1><div class="sub" style="max-width:74%">${s.sub}</div><div class="foot">Cambium Academy · Course 03</div>${chipHtml()}`;
  } else if (s.t === "close") {
    h = `<div class="kicker" style="margin-top:3%">${s.k}</div><h1 style="color:#FFFDF6">${s.h}</h1><div class="rows" style="margin-top:16px">` +
      s.rows.map(r => `<div class="row"><div class="dot"></div><div><b>${r[0]}</b><span>${r[1]}</span></div></div>`).join("") +
      `</div><div style="margin-top:18px"><a href="${nextStep().href}" style="display:inline-block;background:linear-gradient(135deg,#D9B25C,#B98A2D);color:#1F3D24;font-weight:800;padding:12px 26px;border-radius:10px;text-decoration:none;box-shadow:0 6px 20px rgba(217,178,92,.35)">${nextStep().label}</a></div><div class="foot">${s.foot}</div>${chipHtml()}`;
  } else {
    h = `<div class="kicker">${s.k}</div><h2 class="stitle">${s.h}</h2>`;
    if (s.q) h += `<div class="quote">${s.q}</div>`;
    if (s.rows) h += `<div class="rows">` + s.rows.map(r => `<div class="row"><div class="dot"></div><div><b>${r[0]}</b><span>${r[1]}</span></div></div>`).join("") + `</div>`;
    if (s.cards) h += `<div class="grid ${s.cls || 'g3'}">` + s.cards.map(c => `<div class="card">${c[0] ? `<div class="cnum">${c[0]}</div>` : ""}<b>${c[1]}</b><p>${c[2] || ""}</p></div>`).join("") + `</div>`;
    if (s.stats) h += `<div class="stats">` + s.stats.map(x => `<div class="stat"><div class="v">${x[0]}</div><p>${x[1]}</p></div>`).join("") + `</div>`;
    if (s.rowsT) h += `<table><tr>${s.head.map(x => `<th>${x}</th>`).join("")}</tr>` + s.rowsT.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join("")}</tr>`).join("") + `</table>`;
    if (s.note) h += `<div class="note">${s.note}</div>`;
    if (s.warn) h += `<div class="note warn">${s.warn}</div>`;
  }
  slideEl.innerHTML = h;
  slideEl.style.animation = "none";
  void slideEl.offsetWidth;
  slideEl.style.animation = "";
  count.innerHTML = "<b>" + (i + 1) + "</b> · " + S.length;
  bar.style.width = (100 * (i + 1) / S.length) + "%";
  document.getElementById('prev').disabled = i === 0;
  document.getElementById('next').disabled = i === S.length - 1;
  chapEl.querySelectorAll('button').forEach(b => {
    const st = +b.dataset.s;
    b.className = (i + 1) >= st && (CHAPTERS.find(c => c[0] > st) ? (i + 1) < CHAPTERS.find(c => c[0] > st)[0] : true) ? "on" : ((i + 1) > st ? "past" : "");
  });
  history.replaceState(null, "", "#" + (i + 1));
  slideEl.scrollTop = 0;
}
function nextStep(){
  try {
    var rd = k => { try { return JSON.parse(localStorage.getItem(k) || "{}"); } catch(e){ return {}; } };
    var cards = Object.keys(rd("cambium-c03-cards")).length;
    var pg = rd("cambium-c03-playground");
    var labs = ["tok","lm","net","ins","ps"].filter(k => pg[k]).length;
    if (cards < 24) return { href: "flashcards.html", label: "Continue the path &#8594; flashcards" };
    if (labs < 5)   return { href: "playground.html", label: "Continue the path &#8594; the AI Lab" };
    return { href: "quiz.html", label: "The quiz is unlocked &#8594; take it now" };
  } catch(e) { return { href: "flashcards.html", label: "Continue the path &#8594; flashcards" }; }
}
function go(d){ i = Math.min(Math.max(i + d, 0), S.length - 1); render(); }
document.getElementById('prev').onclick = () => go(-1);
document.getElementById('next').onclick = () => go(1);
document.addEventListener('keydown', e => {
  if (e.key === "ArrowRight" || e.key === " " || e.key === "PageDown") { e.preventDefault(); go(1); }
  if (e.key === "ArrowLeft" || e.key === "PageUp") { e.preventDefault(); go(-1); }
});
let tx = null;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  if (tx === null) return;
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 60) go(dx < 0 ? 1 : -1);
  tx = null;
});
render();
</script>
